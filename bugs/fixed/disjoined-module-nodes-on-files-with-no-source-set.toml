fix = """
Stopped guessing the source set from the id string. `ProjectFileSegments` now resolves the source
set from the IntelliJ project model (`ExternalSystemModulePropertyManager.getExternalModuleType() ==
"sourceSet"`) and only splits the external id into container + source set for confirmed per-source-set
modules; holder/fallback modules keep their full id with no source set. `FileSegmentContext` carries
an explicit `sourceSet: String?`. `NodePathFactory.filePath` emits the SourceSet segment only when
present and skips the Package segment for Kotlin scripts (`KtFile.isScript()`), so `build.gradle.kts`
attaches directly under its module container as a sibling of the source sets.
"""
