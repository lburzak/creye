clues = [
  "`NodePathFactory.moduleSegments` split the module id at the last `:`, assuming the final token is always a source set (doc: `<projectPath>:<sourceSet>`).",
  "A `build.gradle.kts` belongs to the Gradle *holder* module whose external id is the bare project path `:feature:channels-list` (no source-set suffix); source files belong to the per-source-set module `:feature:channels-list:main`.",
